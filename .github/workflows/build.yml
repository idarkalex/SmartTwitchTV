name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone media dependency (AndroidX Media3 fork)
        run: git clone --depth 1 --branch release https://github.com/fgl27/media.git ${{ github.workspace }}/../media

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x apk/gradlew

      - name: Build Debug APK
        working-directory: apk
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartTwitchTV-debug
          path: apk/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
