name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone media dependency (AndroidX Media3 fork)
        run: git clone --depth 1 --branch release https://github.com/idarkalex/media.git ${{ github.workspace }}/../media

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x apk/gradlew

      - name: Build Release APK
        working-directory: apk
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartTwitchTV-release
          path: apk/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Set up Node.js
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          npm install -g uglify-js html-minifier crass
          node release/scripts/build.js

      - name: Deploy web content to release branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          mkdir -p /tmp/webcontent
          cp release/index.html /tmp/webcontent/index.html
          cp release/extrapageindex.html /tmp/webcontent/extrapageindex.html
          cp -r release/githubio /tmp/webcontent/githubio
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git rm -rf .
          cp -r /tmp/webcontent/* .
          rm -rf /tmp/webcontent
          git add .
          git commit -m "Deploy compiled web content to release branch"
          git push origin release --force
