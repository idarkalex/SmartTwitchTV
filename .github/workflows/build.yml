name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone media dependency (AndroidX Media3 fork)
        run: git clone --depth 1 --branch release https://github.com/idarkalex/media.git ${{ github.workspace }}/../media

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x apk/gradlew

      - name: Build Debug APK
        working-directory: apk
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartTwitchTV-debug
          path: apk/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Deploy web content to release branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan release
          git rm -rf .
          cp -r app/etc .
          cp -r app/Extrapage .
          cp -r app/general .
          cp -r app/languages .
          cp -r app/specific .
          cp -r app/testing .
          cp -r app/thirdparty .
          cp app/index.html .
          git add .
          git commit -m "Deploy web content to release branch"
          git push origin release --force
