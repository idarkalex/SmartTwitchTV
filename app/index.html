                background: transparent !important;

                background-color: rgba(14, 11, 20, 0.9) !important;
                padding: 0.5em !important;
                border-radius: 0.4em !important;
            }

            /* Play dialog exit/retry */
            #play_dialog_exit, #play_dialog_retry {
                background: transparent !important;
            }

            #play_dialog_exit_text, #play_dialog_retry_text {
                background-color: rgba(14, 11, 20, 0.9) !important;
                padding: 0.5em 1em !important;
                border-radius: 0.5em !important;
            }

            /* Minimize warning */
            #minimize_warning {
                background-color: rgba(14, 11, 20, 0.9) !important;
                padding: 0.5em 1em !important;
                border-radius: 0.5em !important;
            }

            /* Dialog warning chat */
            #dialog_warning_chat_text {
                background-color: rgba(14, 11, 20, 0.85) !important;
                border-radius: 0.4em !important;
                padding: 0.3em 0.8em !important;
            }

            /* Chat line */
            .chat_line {
                color: #ffffff !important;
                border-bottom-color: rgba(255, 255, 255, 0.05) !important;
            }

            .chat_loggedin {
                color: #8f8c9f !important;
            }

            /* Nick colors in chat - keep them but add subtle glow */
            .nick {
                font-family: 'Roboto-Bold' !important;
            }

            /* Emoji and emoticon sizing */
            .emoticon, .emoji {
                filter: none !important;
            }

            /* Tag badges */
            .tag {
                filter: none !important;
            }

            /* ==========================================================
               AJUSTES DE TAMAÑO DE FUENTE GLOBAL
               ========================================================== */
            body, html {
                -webkit-text-stroke: 0 !important;
            }

            /* Reducir stroke en textos */
            .strokicon, .strokicon_title {
                text-shadow: none !important;
            }

            .stream_channel_follow_game,
            .pause_button3d {
                text-shadow: none !important;
            }

            /* ==========================================================
               AJUSTES RESPONSIVE FINALES
               ========================================================== */
            /* Asegurar que todo el contenido principal se desplace a la derecha del sidebar */
            #screens_holder {
                margin-left: 0 !important;
            }

            /* Ajustar el topbar para que no se solape */
            #topbar {
                z-index: 5 !important;
            }

            /* Ajustar z-index del sidebar */
            #side_panel_new_holder {
                z-index: 10 !important;
            }

            /* Ocultar elementos vacíos del sidebar que causan espacio extra */
            .side_panel_movel_bottom_holder {
                padding-top: 2vh !important;
            }

            .side_panel_movel_bottom_text {
                height: auto !important;
            }

            /* Ajustar altura de los icon holders del sidebar */
            .side_panel_new_icons_text_holder {
                min-height: 2em !important;
                line-height: 2em !important;
            }

            /* ==========================================================
               CORRECCIONES ESPECÍFICAS PARA LAS CAPTURAS
               ========================================================== */
            /* En la captura se ven 3 columnas porque el ancho del holder es 32% - forzar 24% */
            div[class*="stream_thumbnail_live_holder"] {
                width: 24% !important;
            }

            /* Forzar fondo oscuro en todas las tarjetas */
            div[class*="stream_thumbnail_live"] {
                background-color: #1a1725 !important;
            }

            /* Ocultar bordes de gradiente del sidebar original */
            [class*="side_panel_new_icons_text"] {
                border-image: none !important;
            }

            /* Forzar color de fondo del sidebar */
            [id*="side_panel"] {
                background-color: #16131f !important;

            /* Override para el side_panel_feed que aparece en la captura 1 */
            .side_panel_feed {

            /* Ajustar el contenedor de la escena para que no tenga margen extra */
            #scene1 {

            .user_feed {
                z-index: 50 !important;

            /* Asegurar que las imágenes del grid se vean correctamente */
            .stream_thumbnail_live_img img {
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: 100% !important;
                object-fit: cover !important;
